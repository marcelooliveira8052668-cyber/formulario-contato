<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contato - Empresa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Entre em Contato</h1>
    <p>Preencha o formulário abaixo e retornaremos o mais breve possível.</p>

    <form id="formContato">
        <div class="campo">
            <label>Nome</label>
            <input type="text" id="nome" placeholder="Digite seu nome" required>
        </div>

        <div class="campo">
            <label>Email</label>
            <input type="email" id="email" placeholder="Digite seu email" required>
        </div>

        <div class="campo">
            <label>Telefone</label>
            <input type="tel" id="telefone" placeholder="(11) 99999-9999" required>
        </div>

        <div class="campo">
            <label>Mensagem</label>
            <textarea id="mensagem" rows="4" placeholder="Digite sua mensagem"></textarea>
        </div>

        <button type="submit">Enviar Mensagem</button>
    </form>

    <p id="mensagemSucesso"></p>
</div>

<script src="script.js"></script>
</body>
</html>
